# cr-10 max consolidated configuration
# motherboard: creality v2.4 (atmega2560)
# hotend: phaetus dragonfly

[include mainsail.cfg]

[include KAMP/Configuration/KAMP_Settings.cfg]

[virtual_sdcard]
path: /home/grasply/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]
[exclude_object]
[display_status]

[mcu]
serial: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_A10K205E-if00-port0
baud: 250000
restart_method: arduino

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 2000
max_z_velocity: 15
max_z_accel: 100
square_corner_velocity: 5

[stepper_x]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PE5
position_endstop: 0
position_max: 470
homing_speed: 50

[stepper_y]
step_pin: PF6
dir_pin: !PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PJ1
position_endstop: 0
position_max: 470
homing_speed: 50

#[filament_switch_sensor e0_sensor]
#pause_on_runout: True
#switch_pin: ^ar3

[stepper_z]
step_pin: PL3
dir_pin: !PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 450
position_min: -5

[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 22.400
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB4
sensor_type: Generic 3950
sensor_pin: PK5
min_temp: 0
max_temp: 300
max_extrude_only_distance: 101.0
max_extrude_only_velocity: 50
max_extrude_only_accel: 3000
pressure_advance: 0.42
#control: pid
#pid_kp: 23.664
#pid_ki: 1.242
#pid_kd: 112.701

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
min_temp: 0
max_temp: 120
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182

[filament_switch_sensor e0_sensor]
pause_on_runout: True
switch_pin: ^PE4

[fan]
pin: PH4

[heater_fan nozzle_fan]
pin: PH3
heater: extruder
heater_temp: 50.0

[bltouch]
sensor_pin: ^PD2
control_pin: PB5
x_offset: -29
y_offset: -4
#z_offset: 0
speed: 5
lift_speed: 10
samples: 2
samples_result: median
sample_retract_dist: 3.0

[safe_z_home]
home_xy_position: 225, 225
speed: 80
z_hop: 10
z_hop_speed: 5

[bed_screws]
screw1: 60, 60
screw1_name: front left
screw2: 390, 60
screw2_name: front right
screw3: 390, 390
screw3_name: rear right
screw4: 60, 390
screw4_name: rear left

[screws_tilt_adjust]
screw1: 59, 64
screw1_name: front left screw
screw2: 439, 64
screw2_name: front right screw
screw3: 439, 414
screw3_name: rear right screw
screw4: 59, 414
screw4_name: rear left screw
horizontal_move_z: 10
speed: 180
screw_thread: CW-M4

[bed_mesh]
speed: 180
horizontal_move_z: 7
mesh_min: 30, 30
mesh_max: 441, 466
probe_count: 7, 7
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
split_delta_z: .025

[adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: adxl345
probe_points:
    225, 225, 20

[temperature_sensor raspberry_pi]
sensor_type: temperature_host

# --- MACROS ---
[gcode_macro START_PRINT]
description: Alias for PRINT_START
gcode:
    PRINT_START {rawparams}

[gcode_macro END_PRINT]
description: Alias for PRINT_END
gcode:
    PRINT_END {rawparams}

[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    
    M117 Pre-heating...
    M140 S{BED_TEMP}
    M104 S150
    G90
    G28
    
    M117 Heating Bed...
    M190 S{BED_TEMP}
    
    M117 Adaptive Probing...
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1

    M117 Smart Parking...
    SMART_PARK
    
    M117 Final Heating...
    M109 S{EXTRUDER_TEMP}
    
    M117 Purging...
    LINE_PURGE
    M117 Printing...

[gcode_macro PRINT_END]
gcode:
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set current_z = printer.toolhead.position.z|float %}
    
    G91
    {% if current_z < (max_z - 10) %}
        G1 Z10 F600
    {% else %}
        G90
        G1 Z{max_z} F600
    {% endif %}

    G90
    G1 X0 Y450 F3000
    M104 S0
    M140 S0
    M107
    M84
    M117 Print Finished

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  M107
  G91
  G1 Z10 F3000
  G90
  G1 X0 Y450 F3000
  CLEAR_PAUSE
  SDCARD_RESET_FILE
  CANCEL_PRINT_BASE

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  G91
  G1 E-2 F2700
  G1 Z10 F600
  G90
  G1 X10 Y450 F3000

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  RESUME_BASE
  G91
  G1 E2.5 F300
  G1 Z-10 F600
  G90

[gcode_macro CHECK_BED_TILT]
description: Measures bed tilt and suggests knob adjustments
gcode:
    G28
    SCREWS_TILT_CALCULATE

[gcode_macro CREATE_BED_MESH]
description: Heats bed to 60C, homes, probes, and saves
gcode:
    M140 S60
    M190 S60
    G28
    BED_MESH_CALIBRATE
    SAVE_CONFIG

[gcode_macro G29]
description: Home all axes and run a full bed mesh
gcode:
    G28
    BED_MESH_CALIBRATE

[gcode_macro LOAD_SAVED_MESH]
description: Clears current state and loads the default bed mesh
gcode:
    BED_MESH_CLEAR
    BED_MESH_PROFILE LOAD=default
    {action_respond_info("Bed mesh 'default' loaded")}

[gcode_macro SAFE_SHUTDOWN]
description: Halts the Raspberry Pi
gcode:
    M400
    BED_MESH_CLEAR
    M117 System Halting
    {action_call_remote_method("shutdown_machine")}

