# --- FLUIDD & MAINSAIL REQUIREMENTS ---
[virtual_sdcard]
path: /home/grasply/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]

[exclude_object]

[display_status]

# --- PRINTER SETTINGS ---
[mcu]
# Ensure you paste your serial ID here (e.g. /dev/serial/by-id/usb-1a86...)
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
minimum_cruise_ratio: 0.5
square_corner_velocity: 5.0
max_z_velocity: 15
max_z_accel: 100

[display]
lcd_type: st7920
cs_pin: PB12
sclk_pin: PB13
sid_pin: PB15
encoder_pins: ^PB14, ^PB10
click_pin: ^!PB2

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[output_pin beeper_pin]
pin: PC6
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001 # 1kHz tone

# --- STEPPERS ---
[stepper_x]
step_pin: PB9
dir_pin: PC2
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PB7
dir_pin: PB8
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: PB5
dir_pin: !PB6
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -6

# --- EXTRUDER (Phaetus Dragonfly) ---
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PC3
microsteps: 16
rotation_distance: 22.479
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PC5
min_temp: 0
max_temp: 300
max_extrude_cross_section: 4.0
max_extrude_only_distance: 101.0
pressure_advance: 0.458
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114

# --- HEATER BED ---
[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182

# --- FANS ---
[fan]
pin: PA0

[input_shaper]
#shaper_freq_x: 72.5
#shaper_type_x: mzv
shaper_freq_y: 42.6
shaper_type_y: mzv



# --- BLTOUCH & HOMING ---
[bltouch]
sensor_pin: ^PB1
control_pin: PB0
x_offset: -43
y_offset: -5
#z_offset: 0

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: adxl345
probe_points:
    117, 117, 20  # This should be the center of your bed

[safe_z_home]
# This puts the PROBE at 10, 10 for homing at the front-left corner
home_xy_position: 53, 15 
speed: 50
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 15, 15
# Boundaries based on your BLTouch offset (X-43, Y-5)
mesh_max: 192, 230 
probe_count: 5, 5
# The following lines improve the mesh accuracy for adaptive probing:
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
split_delta_z: .025

[screws_tilt_adjust]
# Coordinates adjusted so the PROBE sits directly over the M4 screws
screw1: 73, 37
screw1_name: front left screw
screw2: 235, 37
screw2_name: front right screw
screw3: 235, 207
screw3_name: rear right screw
screw4: 73, 207
screw4_name: rear left screw
horizontal_move_z: 10
speed: 150
screw_thread: CW-M4

# --- MACROS ---
[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  M107 ; turn off fan
  G91 ; relative positioning
  G1 Z10 F3000 ; lift nozzle 10mm
  G90 ; absolute positioning
  G1 X0 Y200 F3000 ; park the bed forward so you can reach the print
  CLEAR_PAUSE
  SDCARD_RESET_FILE
  CANCEL_PRINT_BASE

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  G91
  # Retract 2mm to prevent oozing while you change the reel
  G1 E-2 F2700
  # Lift 10mm
  G1 Z10 F600
  G90
  # Park the head out of the way
  G1 X10 Y200 F3000

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  # Move back to the last position but stay 10mm up
  RESUME_BASE
  G91
  # Prime the nozzle: Extrude 2.5mm to replace the retraction + a bit extra
  G1 E2.5 F300
  # Move back down to the print surface
  G1 Z-10 F600
  G90

[gcode_macro CHECK_BED_TILT]
description: Measures bed tilt and suggests knob adjustments
gcode:
    G28
    SCREWS_TILT_CALCULATE

[gcode_macro CREATE_BED_MESH]
description: Heats bed to 60C, homes, probes, and saves
gcode:
    M140 S60 ; Set bed temperature to 60C
    M190 S60 ; Wait for bed to reach 60C
    G28 ; Home all axes
    BED_MESH_CALIBRATE
    SAVE_CONFIG

[gcode_macro LOAD_SAVED_MESH]
description: Clears current state and loads the default bed mesh
gcode:
    BED_MESH_CLEAR
    BED_MESH_PROFILE LOAD=default
    {action_respond_info("Bed mesh 'default' loaded")}

[gcode_macro START_PRINT]
gcode:
    PRINT_START {rawparams}

[gcode_macro END_PRINT]
gcode:
    PRINT_END {rawparams}

[gcode_macro PRINT_START]
gcode:
    # 1. Fetch temperatures from the slicer
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    
    # 2. Pre-heat and Home
    M117 Pre-heating...
    M140 S{BED_TEMP}             ; Start heating bed
    M104 S150                    ; Set nozzle to "idle" temp (150C) to prevent ooze
    G90                          ; Use absolute coordinates
    G28                          ; Home all axes
    G1 Z5 F3000                  ; Lift nozzle
    
    # 3. Wait for bed to reach temperature
    M117 Heating Bed...
    M190 S{BED_TEMP}             ; Wait for bed temp
    
    # 4. Adaptive Bed Mesh
    M117 Adaptive Probing...
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1
    
    # 5. Final nozzle heat-up
    G1 X0.1 Y20 Z5 F5000.0 
    M117 Final Heating...
    M109 S{EXTRUDER_TEMP}        ; Wait for final nozzle temp
    
    # 6. Purge Line (The Nozzle Primer)
    M117 Purging...
    G1 Z0.3 F3000                ; Lower to layer height
    G92 E0                       ; Reset extruder
    G1 X0.1 Y200.0 Z0.3 F1500.0 E15 ; First line
    G1 X0.4 Y200.0 Z0.3 F5000.0     ; Shift sideways
    G1 X0.4 Y20 Z0.3 F1500.0 E30    ; Second line
    G92 E0                       ; Reset extruder
    G1 Z2.0 F3000                ; Lift nozzle
    M117 Printing...

[gcode_macro END_PRINT]
gcode:
    # 1. Calculations and Safety Check
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set current_z = printer.toolhead.position.z|float %}
    
    # 2. Lift nozzle relative to the print
    G91 ; Set to relative positioning
    {% if current_z < (max_z - 10) %}
        G1 Z10 F600 ; Lift nozzle 10mm if there is room
    {% else %}
        G90 ; Switch to absolute
        G1 Z{max_z} F600 ; Otherwise move nozzle to absolute max height
    {% endif %}

    # 3. Present the print
    G90 ; Ensure we are in absolute positioning
    G1 X0 Y220 F3000 ; Move bed forward to present print
    
    # 4. Shutdown heaters and fans
    M104 S0 ; Turn off nozzle heater
    M140 S0 ; Turn off bed heater
    M107 ; Turn off fan
    
    # 5. Disable steppers
    M84 ; Disable motors
    M117 Print Finished

[gcode_macro TEST_SQUARE_08]
gcode:
    PRINT_START BED_TEMP=60 EXTRUDER_TEMP=215
    G90
    G1 Z5 F3000                 ; Lift for safety
    G1 X65 Y65 F5000            ; Move to start position
    G1 Z0.4 F300                ; Lower to 0.4mm layer height
    M83                         ; Relative extrusion
    # Draw a 100mm square
    G1 X165 E25 F1200           ; Line 1
    G1 Y165 E25                 ; Line 2
    G1 X65 E25                  ; Line 3
    G1 Y65 E25                  ; Line 4
    G1 Z5 F3000                 ; Lift
    PRINT_END

[gcode_macro SAFE_SHUTDOWN]
description: Halts the Raspberry Pi
gcode:
    M400
    BED_MESH_CLEAR
    M117 System Halting
    {action_call_remote_method("shutdown_machine")}

