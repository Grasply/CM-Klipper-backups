# cr-10 max consolidated configuration
# motherboard: creality v2.4 (atmega2560)
# hotend: phaetus dragonfly

[include mainsail.cfg]
[include KAMP/Configuration/KAMP_Settings.cfg]

[virtual_sdcard]
path: /home/grasply/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]
[exclude_object]
[display_status]

[mcu]
serial: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_A10K205E-if00-port0
baud: 250000
restart_method: arduino

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 2000
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 5

[stepper_x]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PE5
position_endstop: 0
position_max: 450
homing_speed: 50

[stepper_y]
step_pin: PF6
dir_pin: !PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PJ1
position_endstop: 0
position_max: 450
homing_speed: 50

#[filament_switch_sensor e0_sensor]
#pause_on_runout: True
#switch_pin: ^ar3

[stepper_z]
step_pin: PL3
dir_pin: !PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 470
position_min: -5

[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 22.400
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB4
sensor_type: Generic 3950
sensor_pin: PK5
min_temp: 0
max_temp: 280
pressure_advance: 0.42
max_extrude_only_distance: 101.0
#control: pid
#pid_kp: 23.664
#pid_ki: 1.242
#pid_kd: 112.701

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
min_temp: 0
max_temp: 120
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182

[filament_switch_sensor e0_sensor]
pause_on_runout: True
switch_pin: ^PE4

[fan]
pin: PH4

[heater_fan nozzle_fan]
pin: PH3
heater: extruder
heater_temp: 50.0

[bltouch]
sensor_pin: ^PD2
control_pin: PB5
x_offset: -38
y_offset: -5
#z_offset: 0
speed: 5
lift_speed: 10
samples: 2
samples_result: median
sample_retract_dist: 3.0

[safe_z_home]
home_xy_position: 225, 225
speed: 80
z_hop: 10
z_hop_speed: 5

[bed_screws]
screw1: 60, 60
screw1_name: front left
screw2: 390, 60
screw2_name: front right
screw3: 390, 390
screw3_name: rear right
screw4: 60, 390
screw4_name: rear left


[bed_mesh]
speed: 180
horizontal_move_z: 5
# Adjusting boundaries for the CM 450x450 bed
# mesh_min and mesh_max are based on your probe offsets
mesh_min: 30, 30
mesh_max: 410, 440
probe_count: 7, 7
algorithm: bicubic
# Refinements carried over from the EP configuration:
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
split_delta_z: .025

[adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: adxl345
probe_points:
    225, 225, 20

[temperature_sensor raspberry_pi]
sensor_type: temperature_host

[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    M140 S{BED_TEMP}
    M104 S150
    G90
    G28
    M190 S{BED_TEMP}
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1
    SMART_PARK
    M109 S{EXTRUDER_TEMP}
    LINE_PURGE

[gcode_macro PRINT_END]
gcode:
    G91
    G1 Z10 F600
    G90
    G1 X0 Y400 F3000
    M104 S0
    M140 S0
    M107
    M84

[gcode_macro SAFE_SHUTDOWN]
description: Halts the Raspberry Pi
gcode:
    M400
    BED_MESH_CLEAR
    M117 System Halting
    {action_call_remote_method("shutdown_machine")}

