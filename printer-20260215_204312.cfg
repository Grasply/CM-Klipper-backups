# --- FLUIDD & MAINSAIL REQUIREMENTS ---
[virtual_sdcard]
path: /home/grasply/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]

[display_status]

# --- PRINTER SETTINGS ---
[mcu]
# Ensure you paste your serial ID here (e.g. /dev/serial/by-id/usb-1a86...)
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# --- STEPPERS ---
[stepper_x]
step_pin: PB9
dir_pin: PC2
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PB7
dir_pin: PB8
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: PB5
dir_pin: !PB6
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -6

# --- EXTRUDER (Phaetus Dragonfly) ---
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PC3
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PC5
min_temp: 0
max_temp: 300
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114

# --- HEATER BED ---
[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182

# --- FANS ---
[fan]
pin: PA0

# --- BLTOUCH & HOMING ---
[bltouch]
sensor_pin: ^PB1
control_pin: PB0
x_offset: -43
y_offset: -5
#z_offset: 0

[safe_z_home]
# This puts the PROBE at 10, 10 for homing at the front-left corner
home_xy_position: 53, 15 
speed: 50
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 15, 15
# Max X is 235 - 43 = 192 | Max Y is 235 - 5 = 230
mesh_max: 192, 230 
probe_count: 5, 5

[screws_tilt_adjust]
# Coordinates adjusted so the PROBE sits directly over the M4 screws
screw1: 73, 37
screw1_name: front left screw
screw2: 235, 37
screw2_name: front right screw
screw3: 235, 207
screw3_name: rear right screw
screw4: 73, 207
screw4_name: rear left screw
horizontal_move_z: 10
speed: 150
screw_thread: CW-M4

# --- MACROS ---
[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
  G91 ; relative
  G1 Z10 F600 ; lift
  G90 ; absolute
  G1 X0 Y220 F3000 ; present bed
  M84 ; disable motors

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  G91
  G1 Z10 F600

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  RESUME_BASE
  G91
  G1 Z-10 F600

